<!-- Gentle 3D tilt effect for ultra-premium interactive card (enhances luxury without altering content) -->
<script>
  (function() {
    const card = document.getElementById('premiumTiltCard');
    if (!card) return;
    let bounds = card.getBoundingClientRect();
    
    function updateBounds() {
      bounds = card.getBoundingClientRect();
    }
    window.addEventListener('resize', updateBounds);
    updateBounds();
    
    card.addEventListener('mousemove', (e) => {
      const x = e.clientX - bounds.left;
      const y = e.clientY - bounds.top;
      const centerX = bounds.width / 2;
      const centerY = bounds.height / 2;
      const rotateY = ((x - centerX) / centerX) * 3.5;   // max ±3.5deg
      const rotateX = ((centerY - y) / centerY) * 3;
      card.style.transform = `perspective(1200px) translateY(-4px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.01)`;
      card.style.transition = 'transform 0.08s linear';
    });
    
    card.addEventListener('mouseleave', () => {
      card.style.transform = 'perspective(1200px) translateY(0) rotateX(0deg) rotateY(0deg) scale(1)';
      card.style.transition = 'transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.4s';
    });
    
    card.addEventListener('mouseenter', () => {
      card.style.transition = 'transform 0.1s ease-out';
    });
  })();
</script>
